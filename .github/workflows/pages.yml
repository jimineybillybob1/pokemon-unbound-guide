name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configure optional cloud sync endpoint
        env:
          UNBOUND_SYNC_ENDPOINT: ${{ vars.UNBOUND_SYNC_ENDPOINT }}
        run: |
          node -e "require('fs').writeFileSync('sync-config.js', 'window.UNBOUND_SYNC_ENDPOINT = ' + JSON.stringify(process.env.UNBOUND_SYNC_ENDPOINT || '') + ';\n')"

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
